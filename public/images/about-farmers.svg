<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0B1F12"/>
      <stop offset="1" stop-color="#070A08"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#67D98B"/>
      <stop offset="1" stop-color="#2FB85A"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFD86B"/>
      <stop offset="1" stop-color="#F7C948"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>

  <circle cx="1250" cy="260" r="150" fill="url(#sun)" opacity="0.14" filter="url(#soft)"/>
  <circle cx="350" cy="250" r="190" fill="url(#leaf)" opacity="0.12" filter="url(#soft)"/>

  <!-- ground -->
  <path d="M0 760C280 680 560 690 820 770C1100 855 1350 865 1600 800V1200H0V760Z" fill="#0F2B18" opacity="0.9"/>
  <path d="M0 820C300 745 590 760 850 840C1120 925 1370 938 1600 870V1200H0V820Z" fill="#13401F" opacity="0.9"/>

  <!-- abstract farmers (simple silhouettes) -->
  <g opacity="0.92">
    <!-- farmer 1 -->
    <circle cx="620" cy="585" r="44" fill="#07140C"/>
    <path d="M540 820C548 728 588 650 620 650C652 650 692 728 700 820" fill="#07140C"/>
    <path d="M560 700C590 680 652 680 680 700" stroke="#B7F2C8" stroke-opacity="0.28" stroke-width="6" stroke-linecap="round"/>
    <!-- hat -->
    <path d="M560 560C590 520 650 520 680 560C650 575 590 575 560 560Z" fill="#0B1F12"/>
    <rect x="555" y="554" width="130" height="14" rx="7" fill="#0B1F12"/>

    <!-- farmer 2 -->
    <circle cx="920" cy="600" r="40" fill="#07140C"/>
    <path d="M850 820C858 740 892 670 920 670C948 670 982 740 990 820" fill="#07140C"/>
    <!-- scarf -->
    <path d="M885 680C910 708 932 708 955 680" stroke="#FFD86B" stroke-opacity="0.32" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- foreground glass card hint -->
  <g opacity="0.9">
    <rect x="120" y="120" width="520" height="250" rx="26" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <rect x="160" y="170" width="360" height="18" rx="9" fill="#FFFFFF" fill-opacity="0.22"/>
    <rect x="160" y="205" width="420" height="14" rx="7" fill="#FFFFFF" fill-opacity="0.18"/>
    <rect x="160" y="234" width="390" height="14" rx="7" fill="#FFFFFF" fill-opacity="0.16"/>
    <rect x="160" y="268" width="240" height="38" rx="19" fill="#2FB85A" fill-opacity="0.45"/>
  </g>

  <!-- sprout icons -->
  <g opacity="0.55" stroke="#B7F2C8" stroke-width="6" stroke-linecap="round">
    <path d="M1240 820C1240 760 1240 720 1240 690"/>
    <path d="M1240 720C1212 715 1196 698 1188 678"/>
    <path d="M1240 720C1268 715 1284 698 1292 678"/>
  </g>
</svg>

